<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasqua Theatre — Audio Archive</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="loader">
  <div class="boot-logo">PASQUA THEATRE</div>
  <div class="boot-lines"></div>
  <div class="progress-bar-wrap"><div class="progress-bar"></div></div>
</div>

<div id="dl-overlay">
  <div class="dl-title">▸ INITIATING SECURE DOWNLOAD</div>
  <div class="dl-lines"></div>
  <div class="dl-bar-wrap"><div class="dl-bar"></div></div>
</div>

<nav>
  <a href="/" class="nav-logo">PASQUA THEATRE</a>
  <ul class="nav-links">
    <li><a href="/">HOME</a></li>
    <li><a href="/movies">MOVIES</a></li>
    <li><a href="/music">MUSIC</a></li>
    <li><a href="/library">LIBRARY</a></li>
    <li><a href="/about">ABOUT</a></li>
  </ul>
  <button class="nav-burger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu">
  <a href="/">HOME</a>
  <a href="/movies">MOVIES</a>
  <a href="/music">MUSIC</a>
  <a href="/library">LIBRARY</a>
  <a href="/about">ABOUT</a>
</div>

<main>
  <div class="page-header fade-in-after-load">
    <div class="section-label">> AUDIO ARCHIVE // STREAMING LIVE</div>
    <h1 class="page-title">AUDIO <span>ARCHIVE</span></h1>
    <p class="page-desc">Find the frequency. Capture the signal. Own the track.</p>
  </div>

  <section class="section fade-in-after-load">
    <!-- SEARCH -->
    <div class="search-wrap">
      <span class="search-icon">♪</span>
      <input type="text" class="search-input" id="search" placeholder="> SEARCH AUDIO ARCHIVE..." autocomplete="off">
    </div>

    <!-- GENRE FILTERS -->
    <div class="filter-row" id="genre-filters">
      <button class="filter-chip active" data-genre="all">ALL GENRES</button>
      <button class="filter-chip" data-genre="electronic">ELECTRONIC</button>
      <button class="filter-chip" data-genre="synthwave">SYNTHWAVE</button>
      <button class="filter-chip" data-genre="dark ambient">DARK AMBIENT</button>
      <button class="filter-chip" data-genre="hip-hop">HIP-HOP</button>
    </div>

    <!-- RESULT COUNT -->
    <div style="font-size:0.7rem;color:var(--text-dim);letter-spacing:0.1em;margin-bottom:24px;" id="result-count"></div>

    <!-- GRID -->
    <div class="music-cards-grid" id="music-grid">
      <div style="color:var(--text-dim);font-size:0.8rem;padding:40px 0;">
        > LOADING AUDIO INDEX...
      </div>
    </div>
  </section>
</main>

<script src="/js/main.js"></script>
<script>
let allMusic = [];
let activeGenre = 'all';
let searchVal = '';
let activeAudio = null;
let activePlayBtn = null;

function musicCard(m) {
  const item = JSON.stringify({ id: m.id, title: m.title, artist: m.artist, type: 'music', cover: m.cover }).replace(/"/g, '&quot;');
  return `
    <div class="music-card fade-in" style="flex-direction:column;display:block;">
      <div style="display:grid;grid-template-columns:90px 1fr;">
        <img class="music-cover" style="width:90px;height:90px;" src="${m.cover}" alt="${m.title}" loading="lazy">
        <div class="music-body">
          <div>
            <div class="music-title">${m.title}</div>
            <div class="music-artist">${m.artist}</div>
            <div style="font-size:0.6rem;color:var(--text-dim);margin-top:2px;">${m.album}</div>
          </div>
          <div class="music-meta">
            <span class="tag tag-green">${m.genre}</span>
            <span class="music-duration">${m.duration}</span>
          </div>
        </div>
      </div>
      <div style="padding:12px 14px;border-top:1px solid rgba(0,245,255,0.08);">
        <audio id="audio-${m.id}" src="${m.audioPreview}" preload="none" style="display:none;"></audio>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-sm" onclick="togglePlay(${m.id}, this)" id="play-${m.id}">▶ PREVIEW</button>
          <button class="btn btn-dl btn-sm"
            data-download="${m.downloadUrl}" data-name="${m.title}" data-type="music" data-item="${item}">
            ⬇ DOWNLOAD
          </button>
        </div>
        <audio class="audio-preview" id="player-${m.id}" src="${m.audioPreview}" controls preload="none" style="width:100%;margin-top:10px;display:none;"></audio>
      </div>
    </div>`;
}

function togglePlay(id, btn) {
  const player = document.getElementById(`player-${id}`);
  if (!player) return;

  // Hide all other players
  document.querySelectorAll('.audio-preview').forEach(a => {
    if (a.id !== `player-${id}`) {
      a.style.display = 'none';
      a.pause();
    }
  });
  document.querySelectorAll('[id^="play-"]').forEach(b => {
    if (b.id !== `play-${id}`) b.textContent = '▶ PREVIEW';
  });

  if (player.style.display === 'none') {
    player.style.display = 'block';
    player.play();
    btn.textContent = '■ STOP';
  } else {
    player.style.display = 'none';
    player.pause();
    btn.textContent = '▶ PREVIEW';
  }
}

function renderMusic() {
  let filtered = allMusic.filter(m => {
    const matchGenre = activeGenre === 'all' || m.genre.toLowerCase() === activeGenre;
    const matchSearch = !searchVal || m.title.toLowerCase().includes(searchVal) || m.artist.toLowerCase().includes(searchVal) || m.genre.toLowerCase().includes(searchVal);
    return matchGenre && matchSearch;
  });

  const grid = document.getElementById('music-grid');
  const count = document.getElementById('result-count');
  count.textContent = `> ${filtered.length} TRACK${filtered.length !== 1 ? 'S' : ''} IN INDEX`;

  if (!filtered.length) {
    grid.innerHTML = '<div style="color:var(--text-dim);font-size:0.8rem;padding:60px 0;grid-column:1/-1;">> NO MATCHING SIGNALS IN ARCHIVE</div>';
    return;
  }
  grid.innerHTML = filtered.map(musicCard).join('');
}

async function loadMusic() {
  allMusic = await fetch('/api/music').then(r => r.json());
  renderMusic();
}

document.getElementById('genre-filters').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('#genre-filters .filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeGenre = chip.dataset.genre;
  renderMusic();
});

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchVal = e.target.value.toLowerCase().trim();
    renderMusic();
  }, 250);
});

loadMusic();
</script>
</body>
</html>
